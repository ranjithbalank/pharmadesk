<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaDesk</title>
    <!-- PharmaDesk is the permanent brand; append the pharmacy's own name
         (persisted from the last login) so the tab reads "PharmaDesk — Name". -->
    <script>
      try { var n = localStorage.getItem('pharmadesk_shop'); if (n) document.title = 'PharmaDesk — ' + n } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
