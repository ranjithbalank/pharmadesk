# Render Blueprint — deploys the PharmaDesk Django backend + a Postgres database.
# The React frontend is hosted separately on Vercel (see vercel.json).
#
# To use: push this repo to GitHub, then in Render → "New" → "Blueprint" and
# point it at the repo. Render reads this file and provisions both services.
# After the first deploy, set CORS_ALLOWED_ORIGINS to your Vercel URL.
services:
  - type: web
    name: pharmadesk-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pharmadesk-db
          property: connectionString
      # Set after the first deploy to your Vercel frontend origin, e.g.
      # https://pharma-desk.vercel.app  (comma-separate multiple origins).
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Optional: override the default shared login (admin / pharmadesk).
      - key: PHARMADESK_PASSWORD
        sync: false

databases:
  - name: pharmadesk-db
    plan: free
